          schema:
            type: string
            enum: [subject, resource, policy]
        - in: path
          name: key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cache entry invalidated

  /admin/audit/search:
    get:
      tags: [audit]
      summary: Search the licensed audit log
      operationId: searchAudit
      parameters:
        - in: query
          name: subjectId
          schema:
            type: string
        - in: query
          name: resourceClass
          schema:
            type: string
        - in: query
          name: decision
          schema:
            type: string
            enum: [allow, deny, permit]
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Audit search result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditSearchResult'
        '402':
          description: Pro or Enterprise licence required

  /admin/audit/verify:
