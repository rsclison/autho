  /isAuthorized-at-time:
    post:
      tags: [time-travel]
      summary: Evaluate authorization at a historical timestamp
      operationId: isAuthorizedAtTime
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthzRequest'
                - type: object
                  required: [timestamp]
                  properties:
                    timestamp:
                      type: string
                      format: date-time
      responses:
        '200':
          description: Historical decision result
