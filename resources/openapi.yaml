        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resourceClass, resourceId, action, timestamp]
              properties:
                resourceClass:
                  type: string
                resourceId:
                  type: string
                action:
                  type: string
                timestamp:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Historical subject authorization result
        '503':
          description: Kafka is disabled

  /what-could-access-at:
    post:
