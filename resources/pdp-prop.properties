rules.repository = "resources/jrules.edn"

# Demo/default mode: load users from resources/persons.edn.
# To use LDAP, set person.source = "ldap" and uncomment/configure ldap.*.
person.source = "file"
person.file = "resources/persons.edn"
# ldap.server = "localhost"
# ldap.port = 389
# ldap.basedn = "dc=example,dc=com"
# ldap.filter = "(objectClass=inetOrgPerson)"
# ldap.attributes = "uid,cn,sn,mail,role,service,seuil,department,code,clearance-level"
# ldap.connectstring = "cn=admin,dc=example,dc=com"
# ldap.password = "admin"

delegation.type = "file"
delegation.path = "resources/delegations.edn"

autho.mode = "rest"

log.filepath = "autho.log"
log.rotation.pattern = "daily"

# Path for the shared RocksDB instance used by Kafka PIPs
kafka.pip.rocksdb.path = "/tmp/rocksdb/shared"
